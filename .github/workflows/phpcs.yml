name: PHP Code Sniffer

permissions:
  contents: read

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  phpcs:
    name: Coding Standards (Uchū Docs)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, tokenizer
          tools: composer

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/composer
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Run PHPCBF (auto-fix where possible)
        run: vendor/bin/phpcbf || true

      - name: Run PHPCS (enforce coding standards)
        run: vendor/bin/phpcs --warning-severity=0
